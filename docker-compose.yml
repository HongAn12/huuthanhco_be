services:
  mysql:
    image: mysql:8.4
    container_name: huuthanhco-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: huuthanh_cms
    ports:
      - "3306:3306"
    volumes:
      - huuthanhco_mysql:/var/lib/mysql

volumes:
  huuthanhco_mysql:
